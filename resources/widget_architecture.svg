<svg viewBox="0 0 840 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"></stop>
      <stop offset="100%" stop-color="#16213e"></stop>
    </linearGradient>
    <linearGradient id="lvGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.95"></stop>
      <stop offset="100%" stop-color="#0f2744" stop-opacity="0.95"></stop>
    </linearGradient>
    <linearGradient id="wgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d1b4e" stop-opacity="0.95"></stop>
      <stop offset="100%" stop-color="#1a0f30" stop-opacity="0.95"></stop>
    </linearGradient>
    <linearGradient id="socketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d7377"></stop>
      <stop offset="100%" stop-color="#14919b"></stop>
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8590c" stop-opacity="0.15"></stop>
      <stop offset="100%" stop-color="#e8590c" stop-opacity="0.05"></stop>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4da8da"></polygon>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f76707"></polygon>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#51cf66"></polygon>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22b8cf"></polygon>
    </marker>
  </defs>

  <!-- ==================== Left: LiveView ==================== -->
  <g id="liveview-container">
    <rect x="30" y="70" width="360" height="500" rx="12" fill="url(#lvGrad)" stroke="#2a5a8f" stroke-width="1.5"></rect>

    <!-- Title bar -->
    <rect x="30" y="70" width="360" height="40" rx="12" fill="#2a5a8f" fill-opacity="0.3"></rect>
    <rect x="30" y="98" width="360" height="12" fill="#2a5a8f" fill-opacity="0.3"></rect>
    <circle cx="52" cy="90" r="5" fill="#ff6b6b" opacity="0.8"></circle>
    <circle cx="70" cy="90" r="5" fill="#ffd43b" opacity="0.8"></circle>
    <circle cx="88" cy="90" r="5" fill="#51cf66" opacity="0.8"></circle>
    <text x="210" y="95" text-anchor="middle" fill="#c8ddf0" font-size="15" font-weight="700" letter-spacing="1" font-family="Arial, sans-serif">LiveView</text>

    <!-- mount/3 block -->
    <rect x="50" y="125" width="320" height="42" rx="6" fill="#1a3a5c" stroke="#2a5a8f" stroke-width="0.8"></rect>
    <text x="70" y="151" fill="#4da8da" font-size="13" font-weight="600" font-family="Arial, sans-serif">mount/3</text>
    <text x="340" y="151" text-anchor="end" fill="#6b8aaa" font-size="11">Entry point</text>

    <!-- socket.assigns block -->
    <rect x="50" y="182" width="320" height="80" rx="6" fill="url(#socketGrad)" fill-opacity="0.2" stroke="#14919b" stroke-width="1"></rect>
    <text x="70" y="204" fill="#22b8cf" font-size="12" font-weight="600" font-family="Arial, sans-serif">socket.assigns</text>

    <!-- %Widget{} inside assigns -->
    <rect x="70" y="215" width="130" height="34" rx="5" fill="#2d1b4e" fill-opacity="0.8" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4 2"></rect>
    <text x="135" y="237" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600" font-family="Arial, sans-serif">%Widget{}</text>

    <!-- Other assigns hint -->
    <text x="220" y="237" fill="#6b8aaa" font-size="10" opacity="0.6">page_title, streams, ...</text>

    <!-- Handlers block -->
    <rect x="50" y="278" width="320" height="170" rx="6" fill="#1a3a5c" fill-opacity="0.5" stroke="#2a5a8f" stroke-width="0.8"></rect>
    <text x="70" y="300" fill="#c8ddf0" font-size="12" font-weight="600" letter-spacing="0.5">Handlers</text>

    <!-- handle_event -->
    <rect x="66" y="312" width="290" height="32" rx="4" fill="#1a3a5c" stroke="#3a6a9f" stroke-width="0.5"></rect>
    <text x="82" y="333" fill="#4da8da" font-size="12" font-family="Arial, sans-serif">handle_event/3</text>
    <text x="340" y="333" text-anchor="end" fill="#6b8aaa" font-size="10">User events</text>

    <!-- handle_info -->
    <rect x="66" y="352" width="290" height="32" rx="4" fill="#1a3a5c" stroke="#3a6a9f" stroke-width="0.5"></rect>
    <text x="82" y="373" fill="#4da8da" font-size="12" font-family="Arial, sans-serif">handle_info/2</text>
    <text x="340" y="373" text-anchor="end" fill="#6b8aaa" font-size="10">Process messages</text>

    <!-- handle_params -->
    <rect x="66" y="392" width="290" height="32" rx="4" fill="#1a3a5c" stroke="#3a6a9f" stroke-width="0.5"></rect>
    <text x="82" y="413" fill="#4da8da" font-size="12" font-family="Arial, sans-serif">handle_params/3</text>
    <text x="340" y="413" text-anchor="end" fill="#6b8aaa" font-size="10">URL params</text>

    <!-- render block -->
    <rect x="50" y="472" width="320" height="42" rx="6" fill="#1a3a5c" stroke="#2a5a8f" stroke-width="0.8"></rect>
    <text x="70" y="498" fill="#4da8da" font-size="13" font-weight="600" font-family="Arial, sans-serif">render/1</text>
  </g>

  <!-- ==================== Widget.render call (prominent, below render) ==================== -->
  <g id="widget-call">
    <rect x="60" y="530" width="300" height="30" rx="6" fill="#2d1b4e" fill-opacity="0.6" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4 2"></rect>
    <text x="210" y="550" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600" font-family="Arial, sans-serif">
      &lt;Widget.render state={@widget} /&gt;
    </text>
  </g>

  <!-- ==================== Right: %Widget{} ==================== -->
  <g id="widget-container">
    <rect x="440" y="70" width="370" height="500" rx="12" fill="url(#wgGrad)" stroke="#5a3d8a" stroke-width="1.5"></rect>

    <!-- Title bar -->
    <rect x="440" y="70" width="370" height="40" rx="12" fill="#5a3d8a" fill-opacity="0.3"></rect>
    <rect x="440" y="98" width="370" height="12" fill="#5a3d8a" fill-opacity="0.3"></rect>
    <circle cx="462" cy="90" r="5" fill="#ff6b6b" opacity="0.8"></circle>
    <circle cx="480" cy="90" r="5" fill="#ffd43b" opacity="0.8"></circle>
    <circle cx="498" cy="90" r="5" fill="#51cf66" opacity="0.8"></circle>
    <text x="625" y="95" text-anchor="middle" fill="#d4b5f5" font-size="15" font-weight="700" letter-spacing="1" font-family="Arial, sans-serif">%Widget{}</text>

    <!-- assign_component/2 block -->
    <rect x="460" y="125" width="330" height="42" rx="6" fill="#2d1b4e" stroke="#7c3aed" stroke-width="0.8"></rect>
    <text x="480" y="151" fill="#c4b5fd" font-size="13" font-weight="600" font-family="Arial, sans-serif">assign_component/2</text>
    <text x="760" y="151" text-anchor="end" fill="#8a6aaf" font-size="11">Init · Subscribe · Attach</text>

    <!-- attach_hook/4 + HOOKS combined container -->
    <rect x="460" y="182" width="330" height="256" rx="6" fill="url(#hookGrad)" stroke="#e8590c" stroke-width="1" stroke-dasharray="4 2"></rect>
    <text x="480" y="204" fill="#f76707" font-size="12" font-weight="600" font-family="Arial, sans-serif">attach_hook/4</text>
    <text x="760" y="204" text-anchor="end" fill="#8a6aaf" font-size="10">Plugs into LiveView lifecycle</text>
    <text x="480" y="224" fill="#8a6aaf" font-size="10" opacity="0.8" font-family="Arial, sans-serif">:handle_event  ·  :handle_info  ·  :handle_params  ·  :after_render</text>


    <!-- hooked_event -->
    <rect x="476" y="312" width="300" height="32" rx="4" fill="#2d1b4e" stroke="#e8590c" stroke-width="0.5"></rect>
    <text x="492" y="333" fill="#f76707" font-size="12" font-family="Arial, sans-serif">hooked_event/3</text>
    <rect x="650" y="321" width="52" height="18" rx="3" fill="#e8590c" fill-opacity="0.2" stroke="#e8590c" stroke-width="0.5"></rect>

    <text x="756" y="333" text-anchor="end" fill="#8a6aaf" font-size="10">Events</text>

    <!-- hooked_info -->
    <rect x="476" y="352" width="300" height="32" rx="4" fill="#2d1b4e" stroke="#51cf66" stroke-width="0.5"></rect>
    <text x="492" y="373" fill="#51cf66" font-size="12" font-family="Arial, sans-serif">hooked_info/2</text>
    <rect x="650" y="361" width="52" height="18" rx="3" fill="#51cf66" fill-opacity="0.15" stroke="#51cf66" stroke-width="0.5"></rect>

    <text x="756" y="373" text-anchor="end" fill="#8a6aaf" font-size="10">PubSub</text>

    <!-- hooked_params -->
    <rect x="476" y="392" width="300" height="32" rx="4" fill="#2d1b4e" stroke="#22b8cf" stroke-width="0.5"></rect>
    <text x="492" y="413" fill="#22b8cf" font-size="12" font-family="Arial, sans-serif">hooked_params/3</text>
    <rect x="650" y="401" width="52" height="18" rx="3" fill="#22b8cf" fill-opacity="0.15" stroke="#22b8cf" stroke-width="0.5"></rect>

    <text x="756" y="413" text-anchor="end" fill="#8a6aaf" font-size="10">URL</text>

    <!-- render/1 block -->
    <rect x="460" y="472" width="330" height="42" rx="6" fill="#2d1b4e" stroke="#7c3aed" stroke-width="0.8"></rect>
    <text x="480" y="498" fill="#c4b5fd" font-size="13" font-weight="600" font-family="Arial, sans-serif">render/1</text>
    <text x="760" y="498" text-anchor="end" fill="#8a6aaf" font-size="11">Pure function · state → HTML</text>

    <!-- Pure function hint -->
    <text x="625" y="538" text-anchor="middle" fill="#8a6aaf" font-size="10" opacity="0.6" font-style="italic">No side effects, renders only from @state</text>
  </g>

  <!-- ==================== Connection Arrows (rendered LAST, on top) ==================== -->
  <g id="connections">
    <!-- mount/3 → assign_component/2 -->
    <line x1="390" y1="146" x2="440" y2="146" stroke="#4da8da" stroke-width="1.5" marker-end="url(#arrowBlue)"></line>
    <text x="415" y="140" text-anchor="middle" fill="#4da8da" font-size="9" font-weight="600">calls</text>

    <!-- hooked_event → handle_event (:cont) -->
    <line x1="440" y1="328" x2="360" y2="328" stroke="#f76707" stroke-width="1.2" marker-end="url(#arrowOrange)" opacity="0.7"></line>
    <text x="400" y="322" text-anchor="middle" fill="#f76707" font-size="8" font-weight="600">:cont/:halt</text>

    <!-- hooked_info → handle_info (:cont) -->
    <line x1="440" y1="368" x2="360" y2="368" stroke="#51cf66" stroke-width="1.2" marker-end="url(#arrowGreen)" opacity="0.7"></line>
    <text x="400" y="362" text-anchor="middle" fill="#51cf66" font-size="8" font-weight="600">:cont/:halt</text>

    <!-- hooked_params → handle_params (:cont) -->
    <line x1="440" y1="408" x2="360" y2="408" stroke="#22b8cf" stroke-width="1.2" marker-end="url(#arrowTeal)" opacity="0.7"></line>
    <text x="400" y="402" text-anchor="middle" fill="#22b8cf" font-size="8" font-weight="600">:cont/:halt</text>

    <!-- render/1 (left) → render/1 (right) -->
    <line x1="390" y1="493" x2="440" y2="493" stroke="#c4b5fd" stroke-width="1.2" marker-end="url(#arrowBlue)" opacity="0.6"></line>
    <text x="415" y="487" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">calls</text>

    <!-- Widget.render call → Widget.render/1 (right) -->
    <path d="M 360 545 Q 400 545 420 530 Q 440 515 460 510" fill="none" stroke="#c4b5fd" stroke-width="1.2" marker-end="url(#arrowBlue)" opacity="0.6"></path>
  </g>

  <!-- ==================== Bottom: Key Principles ==================== -->
  <g id="principles">
    <rect x="30" y="582" width="780" height="28" rx="6" fill="#0f2744" fill-opacity="0.5" stroke="#2a3a5c" stroke-width="0.5"></rect>
    <text x="420" y="601" text-anchor="middle" fill="#6b8aaa" font-size="11">
      <tspan fill="#22b8cf" font-weight="600">socket.assigns</tspan>
      <tspan> is the single source of truth</tspan>
      <tspan dx="16" fill="#3a3a4a">│</tspan>
      <tspan dx="16" fill="#f76707" font-weight="600">hooks</tspan>
      <tspan> intercept lifecycle</tspan>
      <tspan dx="16" fill="#3a3a4a">│</tspan>
      <tspan dx="16" fill="#c4b5fd" font-weight="600">render/1</tspan>
      <tspan> is a pure function</tspan>
      <tspan dx="16" fill="#3a3a4a">│</tspan>
      <tspan dx="16" fill="#51cf66" font-weight="600">:cont / :halt</tspan>
      <tspan> controls propagation</tspan>
    </text>
  </g>

  <!-- ==================== External Input Labels ==================== -->
  <g id="external-inputs">
    <g transform="translate(800, 330)">
      <rect x="-2" y="-9" width="52" height="18" rx="3" fill="#f76707" fill-opacity="0.15" stroke="#f76707" stroke-width="0.5"></rect>
      <text x="25" y="0" text-anchor="middle" dominant-baseline="central" fill="#f76707" font-size="10" font-weight="600">User</text>
    </g>
    <g transform="translate(800, 370)">
      <rect x="-2" y="-9" width="52" height="18" rx="3" fill="#51cf66" fill-opacity="0.15" stroke="#51cf66" stroke-width="0.5"></rect>
      <text x="25" y="0" text-anchor="middle" dominant-baseline="central" fill="#51cf66" font-size="10" font-weight="600">Msg</text>
    </g>
    <g transform="translate(800, 410)">
      <rect x="-2" y="-9" width="52" height="18" rx="3" fill="#22b8cf" fill-opacity="0.15" stroke="#22b8cf" stroke-width="0.5"></rect>
      <text x="25" y="0" text-anchor="middle" dominant-baseline="central" fill="#22b8cf" font-size="10" font-weight="600">Route</text>
    </g>
  </g>

</svg>
