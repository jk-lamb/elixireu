<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#00d1ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0a0a0a"/>

  <!-- Boxes -->
  <g font-family="monospace" font-size="16" text-anchor="middle" fill="#eaeaea">
    <rect x="100" y="75" width="80" height="50" rx="10" fill="#1a1a1a" stroke="#00d1ff"/>
    <text x="140" y="105">H1</text>

    <rect x="260" y="75" width="80" height="50" rx="10" fill="#1a1a1a" stroke="#00d1ff"/>
    <text x="300" y="105">H2</text>

    <rect x="420" y="75" width="80" height="50" rx="10" fill="#1a1a1a" stroke="#00d1ff"/>
    <text x="460" y="105">H3</text>

    <rect x="580" y="65" width="140" height="70" rx="12" fill="#111" stroke="#ff7edb" stroke-width="2"/>
    <text x="650" y="105">LiveView</text>
  </g>

  <!-- Arrows with spacing -->
  <g stroke="#00d1ff" stroke-width="2" marker-end="url(#arrow)" fill="none">
    <line x1="190" y1="100" x2="250" y2="100"/>
    <line x1="350" y1="100" x2="410" y2="100"/>
    <line x1="510" y1="100" x2="570" y2="100"/>
  </g>
</svg>
